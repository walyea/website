<!-- Place where people fiilout a form to regisiter for instruments-->
<head>
    <title>Name</title>
    <style>
        .navbar {
            display: flex;
            position: sticky;
            align-items: center;
            justify-content: space-between;
            top: 0px;
        }
        .nav-list {
            display: flex;
            list-style: none;
        }
        .nav-list li {
            margin-right: 20px;
        }
        .nav-list li:last-child {
            margin-right: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul class="nav-list">
            <li><a href="./index.html">Home</a></li>
            <li><a href="./aboutus.html">About Us</a></li>
            <li><a href="./questions.html">Register</a></li>
            <li><a href="./donate.html">Donate</a></li>
        </ul>
    </nav>
    <p>
        To Register to get an instrument or lessons: please fill out this form.
    </p>
    <form>
        <p>Are you a Student at Arlington Public Schools</p>
        <input type="radio" id="StudentY" name="StudentY" value="Yes" />
        <label for="StudentY">Yes</label><br></br>
        <input type="radio" id="StudentN" name="StudentN" value="No" />
        <label for="StudentN">No</label>
    </form>
    <form>
        <p>Contact Information</p>
        <label for="StudentName">What is your full name?</label>
        <input type="text" id="StudentName" name="StudentName" value="Name" /><br></br>
         <label for="StudentPhone">What is your or your parent's phone number?</label>
        <input type="text" id="StudentPhone" name="StudentPhone" value="Phone Number" /><br></br>
        <label for="StudentEmail">If you have a phone number, what is it?</label>
        <input type="text" id="StudentEmail" name="StudentEmail" value="Student's Email" /><br></br>
        <label for="ParentEmail">What is your parent's email?</label>
        <input type="text" id="ParentEmail" name="ParentEmail" value="Parents Email" /><br></br>
    </form>
    <form>
        <label for="MusicTeacher"> Who is your current music teacher?</label>
        <input type="text" id="MusicTeacher" name="MusicTeacher" value="Music Teachers Name" /><br></br>
         <label for="StudentGrade">What grade are you in?</label>
        <input type="text" id="StudentGrade" name="StudentGrade" value="Current Grade" /><br></br>
    </form>
    <form>
        <p>Do you want/need help practicing</p>
        <input type="radio" id="StudentPY" name="StudentPY" value="Yes" />
        <label for="StudentPY">Yes</label><br></br>
        <input type="radio" id="StudentPN" name="StudentPN" value="No" />
        <label for="StudentPN">No</label>
    </form>
</body>
